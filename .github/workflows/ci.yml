name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify bundle sizes
        run: npm run size

      - name: Guarantee verification
        run: npm run test:guarantees
        continue-on-error: true

      - name: Reliability testing
        run: npm run test:reliability
        continue-on-error: true
